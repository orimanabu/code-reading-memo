<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∞ Code Canvas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="canvas.css">
</head>
<body>

<div id="toolbar">
  <span class="logo">∞</span>
  <input id="canvas-title" placeholder="キャンバスのタイトル" spellcheck="false">
  <div class="sep"></div>
  <button class="tb-btn" id="btn-add">＋ ブロック追加</button>
  <button class="tb-btn" id="btn-add-bubble">💬 吹き出し</button>
  <div class="sep"></div>
  <button class="tb-btn" id="btn-git-config">⎇ Git設定</button>
  <div class="sep"></div>
  <button class="tb-btn" id="btn-export">↓ エクスポート</button>
  <label class="tb-btn" id="btn-import-label" style="cursor:pointer;">↑ インポート<input type="file" id="btn-import" accept=".json" style="display:none;"></label>
  <button class="tb-btn danger" id="btn-clear">🗑 クリア</button>
  <div class="sep"></div>
  <span id="mode-indicator">SELECT</span>
  <span class="hint">v: 選択 &nbsp;|&nbsp; h: ハンド &nbsp;|&nbsp; Shift+クリック: 複数選択 &nbsp;|&nbsp; Cmd/Ctrl+C/X/V: コピー/カット/ペースト &nbsp;|&nbsp; Del: 削除 &nbsp;|&nbsp; Ctrl/Cmd+ドラッグ: ズーム &nbsp;|&nbsp; ダブルクリック: ブロック追加 &nbsp;|&nbsp; テキスト選択 → リンク</span>
</div>

<div id="wrap">
  <div id="canvas"></div>
  <svg id="svg-links">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#388bfd" opacity="0.65"/>
      </marker>
    </defs>
  </svg>
</div>

<!-- Git Config Dialog -->
<div id="git-dialog-overlay" style="display:none;">
  <div class="git-dialog">
    <div class="git-dialog-title">⎇ Git リポジトリ設定</div>

    <div class="git-form-row">
      <label class="git-form-label" for="git-url">リポジトリ URL</label>
      <input class="git-form-input" id="git-url" type="url" placeholder="https://github.com/owner/repo" spellcheck="false" autocomplete="off">
    </div>

    <div class="git-form-row">
      <label class="git-form-label" for="git-branch">ブランチ名</label>
      <input class="git-form-input" id="git-branch" type="text" placeholder="main" spellcheck="false" autocomplete="off">
    </div>

    <div class="git-form-divider">または</div>

    <div class="git-form-row">
      <label class="git-form-label" for="git-tag">タグ名</label>
      <input class="git-form-input" id="git-tag" type="text" placeholder="v1.0.0" spellcheck="false" autocomplete="off">
    </div>

    <div class="git-form-row">
      <label class="git-form-label" for="git-commit">Commit Hash <span style="color:#484f58;font-weight:400;">(省略可 — ブランチ/タグから自動解決)</span></label>
      <input class="git-form-input" id="git-commit" type="text" placeholder="自動解決" spellcheck="false" autocomplete="off">
    </div>

    <div class="git-form-note" id="git-resolve-note"></div>

    <div class="git-form-buttons">
      <button class="tb-btn" id="git-cancel">キャンセル</button>
      <button class="git-btn-save" id="git-save">保存</button>
    </div>
  </div>
</div>

<!-- Git Snippet Fetch Dialog -->
<div id="fetch-dialog-overlay" style="display:none;">
  <div class="git-dialog">
    <div class="git-dialog-title">⬇ Gitからコードスニペットを取得</div>
    <div class="git-form-note" id="fetch-git-info" style="margin-bottom:16px;"></div>

    <div class="git-form-row">
      <label class="git-form-label" for="fetch-path">相対パス</label>
      <input class="git-form-input" id="fetch-path" type="text" placeholder="src/foo/bar.c" spellcheck="false" autocomplete="off">
    </div>
    <div style="display:flex;gap:12px;">
      <div class="git-form-row" style="flex:1;">
        <label class="git-form-label" for="fetch-start">開始行番号</label>
        <input class="git-form-input" id="fetch-start" type="number" placeholder="1" min="1">
      </div>
      <div class="git-form-row" style="flex:1;">
        <label class="git-form-label" for="fetch-end">終了行番号</label>
        <input class="git-form-input" id="fetch-end" type="number" placeholder="50" min="1">
      </div>
    </div>

    <div class="git-form-note" id="fetch-note"></div>

    <div class="git-form-buttons">
      <button class="tb-btn" id="fetch-cancel">キャンセル</button>
      <button class="git-btn-save" id="fetch-ok">取得</button>
    </div>
  </div>
</div>

<div id="link-tip">🔗 ここからリンクを作成</div>
<div id="status">準備完了</div>

<script src="canvas.js"></script>
</body>
</html>
